services:
  - type: web
    name: tblaugrana-turf
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: TG_TOKEN
        sync: false          # ← à définir dans le dashboard Render (secret)
      - key: TG_CHATS
        sync: false          # ← à définir dans le dashboard Render (secret)
      - key: TG_MAX_COTE
        value: "10"
      - key: DROP_PCT
        value: "20"          # seuil 20%

